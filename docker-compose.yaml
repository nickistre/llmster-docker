# =============================================================================
# LLMster Container Orchestration
# =============================================================================
#
# Architecture:
# - caddy:   HTTPS reverse proxy with Cloudflare DNS-01 + Bearer auth
# - llmster: Headless LM Studio server with AMD GPU support
#
# Copy .env.example to .env and fill in values before starting.
# =============================================================================

name: llmster

services:
  # ============================================
  # CADDY - HTTPS reverse proxy
  # ============================================
  caddy:
    image: nickistre/caddy-cloudflare
    build:
      context: .
      dockerfile: Dockerfile.caddy
      pull: true
    pull_policy: build

    container_name: caddy

    restart: unless-stopped

    ports:
      - "${CADDY_HTTPS_PORT:-1243}:443"

    networks:
      llm-net: {}

    env_file: .env

    volumes:
      - caddy-data:/data
      - caddy-config:/config

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # LLMSTER - Headless LM Studio Server
  # ============================================
  llmster:
    image: nickistre/llmster
    build:
      context: .
      dockerfile: Dockerfile
      pull: true
      args:
        INSTALL_ROCM: ${INSTALL_ROCM:-1}
        ROCM_VERSION: ${ROCM_VERSION:-6.4}
    pull_policy: build

    container_name: llmster

    restart: unless-stopped

    # ========================================================================
    # PORT EXPOSURE - Access from host
    # ========================================================================
    ports:
      - "${LLMSTER_PORT:-1234}:${LLMSTER_PORT:-1234}"

    # ========================================================================
    # NETWORK CONFIGURATION - Name Resolution (No Static IPs)
    # ========================================================================
    networks:
      llm-net: {}

    # ========================================================================
    # GPU DEVICE ACCESS - AMD Vulcan/ROCm Support
    # ========================================================================
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
      - /dev/fuse:/dev/fuse

    group_add:
      - video
      - render

    # ========================================================================
    # ENVIRONMENT CONFIGURATION
    # ========================================================================
    environment:
      # GPU Configuration
      - LIBVA_DRIVER_NAME=radeonsi

      # LLMster Configuration
      - LLMSTER_PORT=${LLMSTER_PORT:-1234}
      - JIT_TTL_SECONDS=${JIT_TTL_SECONDS:-3600}

      - OLLAMA_ORIGINS=*
      - LMS_SERVER_HOST=0.0.0.0

    env_file: .env

    # ========================================================================
    # MODEL DIRECTORY MOUNT - Gradual Migration Support
    # ========================================================================
    volumes:
      - lmstudio-data:/root/.lmstudio

    # ========================================================================
    # RESOURCE LIMITS
    # ========================================================================
    deploy:
      resources:
        reservations:
          memory: 8G
        limits:
          cpus: "4"
          memory: 24G

    # ========================================================================
    # HEALTH CHECK
    # ========================================================================
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # ========================================================================
    # LOGGING CONFIGURATION
    # ========================================================================
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# NETWORK CONFIGURATION - Name Resolution Enabled by Default
# =============================================================================
networks:
  llm-net:

# =============================================================================
# VOLUMES (if needed for future expansion)
# =============================================================================
volumes:
  lmstudio-data:
  caddy-data:
  caddy-config:
